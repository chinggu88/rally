name: Batch — BWF Players

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: 'batch/.python-version'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r batch/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run BWF players crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH: .
        run: python -m batch.jobs.bwf_players.main
